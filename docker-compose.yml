services:
  postgres:
    image: postgres:15-alpine
    container_name: novel-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: novel_ai
      POSTGRES_PASSWORD: novel_ai_password
      POSTGRES_DB: novel_ai_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel_ai -d novel_ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
